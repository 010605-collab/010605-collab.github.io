<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Змейка — Мобильная</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        .game-container {
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 10px;
        }
        
        h1 {
            color: #00ff88;
            margin-bottom: 5px;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            letter-spacing: 2px;
        }
        
        .score-board {
            color: #fff;
            font-size: clamp(0.9rem, 3vw, 1.2rem);
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        
        .score-board span {
            color: #00ff88;
            font-weight: bold;
            font-size: clamp(1rem, 3.5vw, 1.4rem);
        }
        
        canvas {
            border: 2px solid #00ff88;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3), 
                        inset 0 0 20px rgba(0, 255, 136, 0.05);
            background: #0a0a0a;
            max-width: 95vw;
            max-height: 60vh;
            width: auto;
            height: auto;
        }
        
        .controls {
            margin-top: 10px;
            color: #888;
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            display: none;
        }
        
        .controls kbd {
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid #555;
            color: #ccc;
            font-family: monospace;
        }
        
        /* Сенсорные кнопки для мобильных */
        .touch-controls {
            display: none;
            margin-top: 15px;
            gap: 8px;
            flex-direction: column;
            align-items: center;
        }
        
        .touch-row {
            display: flex;
            gap: 8px;
        }
        
        .touch-btn {
            width: clamp(55px, 15vw, 75px);
            height: clamp(55px, 15vw, 75px);
            background: rgba(0, 255, 136, 0.15);
            border: 2px solid rgba(0, 255, 136, 0.4);
            border-radius: 12px;
            color: #00ff88;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.1s;
        }
        
        .touch-btn:active {
            background: rgba(0, 255, 136, 0.4);
            transform: scale(0.95);
        }
        
        .game-over, .start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.92);
            border-radius: 15px;
            padding: clamp(25px, 8vw, 40px);
            display: none;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            width: 85%;
            max-width: 350px;
            z-index: 100;
        }
        
        .start-screen {
            display: block;
            border: 2px solid #00ff88;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.4);
        }
        
        .game-over {
            border: 2px solid #ff4444;
            box-shadow: 0 0 50px rgba(255, 68, 68, 0.4);
        }
        
        .game-over h2, .start-screen h2 {
            font-size: clamp(1.5rem, 5vw, 2rem);
            margin-bottom: 15px;
        }
        
        .game-over h2 { color: #ff4444; }
        .start-screen h2 { color: #00ff88; }
        
        .game-over p, .start-screen p {
            color: #fff;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        .game-over button, .start-screen button {
            background: #00ff88;
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            width: 100%;
            max-width: 200px;
        }
        
        .game-over button:hover, .start-screen button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
        }
        
        /* Показываем сенсорные кнопки на мобильных */
        @media (hover: none) and (pointer: coarse) {
            .touch-controls {
                display: flex;
            }
            .controls {
                display: none;
            }
        }
        
        /* Показываем клавиатуру на ПК */
        @media (hover: hover) and (pointer: fine) {
            .controls {
                display: block;
            }
            .touch-controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 ЗМЕЙКА</h1>
        <div class="score-board">
            <div>Счёт: <span id="score">0</span></div>
            <div>Рекорд: <span id="highScore">0</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        
        <div class="controls">
            Управление: <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> или <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd>
        </div>
        
        <!-- Сенсорные кнопки -->
        <div class="touch-controls" id="touchControls">
            <div class="touch-row">
                <div class="touch-btn" data-dir="up">▲</div>
            </div>
            <div class="touch-row">
                <div class="touch-btn" data-dir="left">◀</div>
                <div class="touch-btn" data-dir="down">▼</div>
                <div class="touch-btn" data-dir="right">▶</div>
            </div>
        </div>
        
        <div class="start-screen" id="startScreen">
            <h2>🐍 ЗМЕЙКА</h2>
            <p>Листайте пальцем по экрану<br>или используйте кнопки</p>
            <button onclick="startGame()">ИГРАТЬ</button>
        </div>
        
        <div class="game-over" id="gameOver">
            <h2>💀 ИГРА ОКОНЧЕНА</h2>
            <p>Ваш счёт: <span id="finalScore">0</span></p>
            <button onclick="restartGame()">ИГРАТЬ СНОВА</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Адаптивный размер canvas
        const GRID_CELLS = 20;
        let gridSize = 20;
        let tileCount = GRID_CELLS;
        
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth * 0.95, 600);
            const maxHeight = window.innerHeight * 0.55;
            const size = Math.min(maxWidth, maxHeight);
            
            canvas.width = size;
            canvas.height = size;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            
            gridSize = size / GRID_CELLS;
            tileCount = GRID_CELLS;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        let snake = [];
        let food = {};
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = false;
        let particles = [];
        
        let moveSpeed = 8;
        let lastMoveTime = 0;
        let moveAccumulator = 0;
        let visualSnake = [];
        
        // Сенсорное управление
        let touchStartX = 0;
        let touchStartY = 0;
        const SWIPE_THRESHOLD = 30;
        
        document.getElementById('highScore').textContent = highScore;
        
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.color = color;
                this.size = Math.random() * 4 + 2;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2;
                this.life -= 0.03;
                this.size *= 0.97;
            }
            
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        function createParticles(x, y, color) {
            for (let i = 0; i < 12; i++) {
                particles.push(new Particle(
                    x * gridSize + gridSize / 2,
                    y * gridSize + gridSize / 2,
                    color
                ));
            }
        }
        
        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            moveSpeed = 8;
            particles = [];
            lastMoveTime = performance.now();
            moveAccumulator = 0;
            
            visualSnake = snake.map(s => ({ x: s.x, y: s.y }));
            
            placeFood();
            updateScore();
        }
        
        function placeFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }
        
        function updateLogic() {
            direction = nextDirection;
            
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };
            
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                createParticles(food.x, food.y, '#ff6b6b');
                placeFood();
                
                if (moveSpeed < 20) {
                    moveSpeed += 0.5;
                }
                
                updateScore();
            } else {
                snake.pop();
            }
        }
        
        function updateVisual(dt) {
            const lerpSpeed = 15 * dt;
            
            for (let i = 0; i < snake.length; i++) {
                if (!visualSnake[i]) {
                    visualSnake[i] = { x: snake[i].x, y: snake[i].y };
                }
                
                visualSnake[i].x += (snake[i].x - visualSnake[i].x) * lerpSpeed;
                visualSnake[i].y += (snake[i].y - visualSnake[i].y) * lerpSpeed;
            }
            
            visualSnake = visualSnake.slice(0, snake.length);
        }
        
        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
            
            const pulse = Math.sin(Date.now() / 200) * 3;
            ctx.fillStyle = '#ff6b6b';
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2 + pulse,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
            
            for (let i = 0; i < visualSnake.length; i++) {
                const segment = visualSnake[i];
                const isHead = i === 0;
                
                const green = Math.max(100, 255 - i * 5);
                ctx.fillStyle = isHead ? '#00ff88' : `rgb(0, ${green}, 100)`;
                
                if (isHead) {
                    ctx.shadowColor = '#00ff88';
                    ctx.shadowBlur = 15;
                }
                
                const x = segment.x * gridSize + 1;
                const y = segment.y * gridSize + 1;
                const size = gridSize - 2;
                const radius = isHead ? 6 : 4;
                
                ctx.beginPath();
                ctx.roundRect(x, y, size, size, radius);
                ctx.fill();
                ctx.shadowBlur = 0;
                
                if (isHead) {
                    ctx.fillStyle = '#000';
                    const eyeOffset = 5;
                    const eyeSize = Math.max(2, gridSize * 0.15);
                    
                    if (direction.x === 1) {
                        ctx.beginPath();
                        ctx.arc(x + size - 6, y + 6, eyeSize, 0, Math.PI * 2);
                        ctx.arc(x + size - 6, y + size - 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction.x === -1) {
                        ctx.beginPath();
                        ctx.arc(x + 6, y + 6, eyeSize, 0, Math.PI * 2);
                        ctx.arc(x + 6, y + size - 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction.y === -1) {
                        ctx.beginPath();
                        ctx.arc(x + 6, y + 6, eyeSize, 0, Math.PI * 2);
                        ctx.arc(x + size - 6, y + 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (direction.y === 1) {
                        ctx.beginPath();
                        ctx.arc(x + 6, y + size - 6, eyeSize, 0, Math.PI * 2);
                        ctx.arc(x + size - 6, y + size - 6, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
            
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
        }
        
        function gameLoop(currentTime) {
            if (!gameRunning) return;
            
            const dt = (currentTime - lastMoveTime) / 1000;
            lastMoveTime = currentTime;
            
            moveAccumulator += dt;
            const moveInterval = 1 / moveSpeed;
            
            while (moveAccumulator >= moveInterval) {
                updateLogic();
                moveAccumulator -= moveInterval;
            }
            
            updateVisual(dt);
            draw();
            
            requestAnimationFrame(gameLoop);
        }
        
        function updateScore() {
            document.getElementById('score').textContent = score;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
        }
        
        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            initGame();
            gameRunning = true;
            lastMoveTime = performance.now();
            requestAnimationFrame(gameLoop);
        }
        
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            initGame();
            gameRunning = true;
            lastMoveTime = performance.now();
            requestAnimationFrame(gameLoop);
        }
        
        // === УПРАВЛЕНИЕ ===
        
        // Клавиатура (ПК)
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('startScreen').style.display !== 'none') {
                if (e.key === 'Enter' || e.key === ' ') {
                    startGame();
                }
                return;
            }
            
            if (document.getElementById('gameOver').style.display === 'block') {
                if (e.key === 'Enter' || e.key === ' ') {
                    restartGame();
                }
                return;
            }
            
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });
        
        window.addEventListener('keydown', (e) => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }
        });
        
        // Сенсорные кнопки
        document.querySelectorAll('.touch-btn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const dir = btn.dataset.dir;
                handleDirection(dir);
            });
            btn.addEventListener('mousedown', (e) => {
                e.preventDefault();
                const dir = btn.dataset.dir;
                handleDirection(dir);
            });
        });
        
        function handleDirection(dir) {
            if (document.getElementById('startScreen').style.display !== 'none') {
                startGame();
                return;
            }
            if (document.getElementById('gameOver').style.display === 'block') {
                restartGame();
                return;
            }
            
            switch(dir) {
                case 'up':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }
        
        // Свайпы по canvas
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
        }, { passive: false });
        
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            const dx = touch.clientX - touchStartX;
            const dy = touch.clientY - touchStartY;
            
            if (Math.abs(dx) < SWIPE_THRESHOLD && Math.abs(dy) < SWIPE_THRESHOLD) {
                // Тап — старт/рестарт
                if (document.getElementById('startScreen').style.display !== 'none') {
                    startGame();
                } else if (document.getElementById('gameOver').style.display === 'block') {
                    restartGame();
                }
                return;
            }
            
            if (Math.abs(dx) > Math.abs(dy)) {
                handleDirection(dx > 0 ? 'right' : 'left');
            } else {
                handleDirection(dy > 0 ? 'down' : 'up');
            }
        }, { passive: false });
        
        // Предотвращаем скролл и зум на всей странице
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });
        
        document.addEventListener('gesturestart', (e) => {
            e.preventDefault();
        });
        
        document.addEventListener('gesturechange', (e) => {
            e.preventDefault();
        });
        
        document.addEventListener('gestureend', (e) => {
            e.preventDefault();
        });
        
        // Начальная отрисовка
        resizeCanvas();
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    </script>
</body>
</html>
